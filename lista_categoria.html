<title>Startups da Categoria</title>

<style>

/* BASE */

body{
font-family:Segoe UI,Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:40px;
}

h1{
text-align:center;
color:#0a2a66;
margin-bottom:10px;
}

.subtitulo{
text-align:center;
margin-bottom:30px;
color:#555;
}


/* BUSCA */

.busca-container{
max-width:500px;
margin:0 auto 40px auto;
}

#busca{
width:100%;
padding:12px 15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}


/* GRID */

.grid-startups{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;

max-width:1100px;
margin:auto;

}


/* CARD */

.card{

background:linear-gradient(135deg,#1f4e79,#2c6fb1);

padding:30px;

border-radius:14px;

color:white;

cursor:pointer;

text-align:center;

box-shadow:0 8px 20px rgba(0,0,0,0.2);

transition:all .3s ease;

position:relative;

overflow:hidden;

}


/* HOVER */

.card:hover{

transform:translateY(-8px) scale(1.02);

box-shadow:0 18px 40px rgba(0,0,0,.35);

}


/* ANIMAÇÃO DE BRILHO */

.card::after{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.4),
transparent
);

transition:.6s;

}

.card:hover::after{

left:100%;

}


/* TEXTO */

.card h3{

margin:0 0 15px 0;
font-size:1.4em;
color:white;

}

.card p{

margin:0;
font-size:.95em;
opacity:.9;
color:white;

}


/* BOTÃO VOLTAR */

.voltar{

display:block;

width:220px;

margin:40px auto;

text-align:center;

padding:12px;

border-radius:8px;

background:#1f4e79;

color:white;

text-decoration:none;

}

</style>
</head>


<body>

<h1 id="tituloCategoria">Startups</h1>

<p class="subtitulo">Empresas cadastradas nesta categoria</p>


<div class="busca-container">
<input type="text" id="busca" placeholder="Pesquisar startup...">
</div>


<div class="grid-startups" id="listaStartups">

</div>


<a class="voltar" href="categorias_startups.html">Voltar para categorias</a>



<script>

const urlParams = new URLSearchParams(window.location.search)
const categoria = urlParams.get("categoria")

document.getElementById("tituloCategoria").innerText =
"Startups - " + categoria


let todasStartups = []


fetch("https://script.google.com/macros/s/AKfycbzpLWLnsVjoEcXLTo87c-PVYQsc4lU4M4ksv0Ux4i9jCeorEo3pEuAA4rEemtpjA3XJFw/exec")

.then(res => res.json())

.then(data => {

let linhas = data.slice(1)

linhas.forEach(linha => {

let nome = linha[0]
let cat = linha[1]

if(cat && cat.toLowerCase() === categoria.toLowerCase()){

todasStartups.push(nome)

}

})

mostrarStartups(todasStartups)

})


function mostrarStartups(lista){

let container = document.getElementById("listaStartups")

container.innerHTML = ""

lista.forEach(nome => {

let card = document.createElement("div")

card.className = "card"

card.innerHTML = `
<h3>${nome}</h3>
<p>Ver dados da startup</p>
`

container.appendChild(card)

})

}


/* PESQUISA */

document.getElementById("busca").addEventListener("input", function(){

let termo = this.value.toLowerCase()

let filtradas = todasStartups.filter(nome =>
nome.toLowerCase().includes(termo)
)

mostrarStartups(filtradas)

})

</script>

</body>
